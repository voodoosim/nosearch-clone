            - listitem [ref=e407]:
              - generic [ref=e408]: 각주
              - text: § 보상 판매 금액은 보상 판매되는 제품의 상태, 연도, 구성에 따라 달라집니다. 일부 기기는 보상 판매 대상이 아닙니다. 크레딧 또는 Apple Store Gift Card로 보상 판매를 받으려면 성인 연령 이상이어야 합니다. 보상 판매 금액은 적용 가능한 새 기기 구입 시 적용하거나 Apple Gift Card로 받을 수 있습니다. 최종 확정 금액은 보상 판매 대상 기기를 수령한 후, 예상 금액 산정 시 제시한 기기의 설명과 일치하는지 비교 검수 후 정해집니다. 판매세는 새로 구입한 기기의 총액을 바탕으로 부과될 수 있습니다. 매장에서 보상 판매를 받으려면 사진이 부착된 유효한 신분증이 필요합니다(현지 법률에 따라 해당 정보를 저장해야 할 수 있음). 일부 매장에서는 본 프로그램을 이용할 수 없으며, 매장 보상 판매와 온라인 보상 판매 간에 차이가 있을 수 있습니다. 일부 매장에서는 추가 요구 사항이 있을 수 있습니다. Apple 또는 보상 판매 파트너사는 어떤 보상 판매도 거래를 거부하거나, 취소하거나, 보상 판매 수량을 제한할 권리를 보유합니다. 적용 가능 기기의 보상 판매 및 재활용에 대한 자세한 내용은 Apple의 보상 판매 파트너사에서 확인하실 수 있습니다. 규제 및 제한이 적용될 수 있습니다.
          - paragraph
