    - generic [ref=e150]:
      - figure "Apple M2 Ultra 칩 애니메이션" [ref=e154]:
        - generic [ref=e158]: M2 Ultra
      - generic [ref=e165]:
        - heading "성능" [level=2] [ref=e166]
        - text: 칩의 판도를 뒤흔들다.
        - paragraph [ref=e167]: 모든 Mac Pro에 강력한 CPU를 탑재시켜 주는 M2 Ultra 칩. 방대한 통합 메모리를 갖춘 GPU는 다른 GPU가 하지 못하는 일들을 해내고, 미디어 엔진은 Afterburner 카드 7개가 내장된 것과 동일한 성능을 발휘합니다. 덕분에 이제 프로 사용자들은 초고사양이 요구되는 워크플로도 그 어느 때보다 빠르고 효율적으로 처리할 수 있죠.
        - button "M2 Ultra 심층 탐구 " [ref=e169] [cursor=pointer]
      - generic [ref=e171]:
        - generic [ref=e172]:
          - paragraph [ref=e173]:
            - emphasis [ref=e174]: M2 Ultra 시대 도래.
            - text: Mac 라인업에 혁신을 일으킨 Apple Silicon, 그중에서도 M2 Ultra가 이제 Mac Pro에 탑재됩니다. M2 Ultra 칩은 고대역폭 통합 메모리, 여러 개의 8K ProRes 동영상 스트림도 너끈히 처리해 내는 미디어 엔진, 초고속 32코어 Neural Engine, 그리고 Secure Enclave를 기반으로 설계된 엄청나게 강력한 성능의 CPU 및 GPU를 갖추고 있죠.
          - figure "두 개의 M2 Max 다이가 연결된 아키텍처를 보여주는 Apple M2 Ultra 칩" [ref=e175]
          - paragraph [ref=e176]:
            - emphasis [ref=e177]: 힘을 합치다.
            - text: M2 Ultra 칩은 강력한 성능을 자랑하는 M2 Max 칩 두 개를 합쳐 만들어집니다. 맞춤 제작된 패키징 아키텍처를 통해 M2 Max 다이 두 개를 결합해 주는 UltraFusion은 매우 적은 전력을 사용하면서도 두 다이 사이에 무려 2.5TB/s에 달하는 프로세서 간 대역폭을 제공합니다. 지연 시간을 놀라울 정도로 줄인 연결 방식이죠. 이렇게 제작된 M2 Ultra는 소프트웨어에 하나의 칩으로 인식되기 때문에, 커진 크기 만큼이나 강력해진 칩의 성능을 앱들도 고스란히 활용할 수 있답니다.
        - generic [ref=e179]:
          - paragraph [ref=e181]:
            - emphasis [ref=e182]: 열일하는 코어.
            - text: M2 Ultra에 탑재된 24코어 CPU는 고성능 코어 16개와 고효율 코어 8개의 힘을 활용해 업계 최고 수준의 와트당 성능을 뿜어냅니다. 최대 76코어 GPU는 27.2Tf의 막강한 그래픽 성능을 발휘하고, 최대 192GB까지 구성 가능한 그래픽 메모리는 가장 강력한 워크스테이션 그래픽 카드가 처리할 수 있는 것보다 더 방대한 규모의 장면들도 너끈히 다룹니다. 그리고 32코어 Neural Engine은 초당 31조 6천억 회에 달하는 연산 처리 능력으로 머신 러닝 작업 속도를 크게 높여줍니다.
