        - list [ref=e1342]:
          - listitem [ref=e1343]:
            - text: Δ 적격 구매자는 2026년 1월 6일부터 3월 11일까지 적격 구매 위치에서 적격 제품과 선택한 프로모션 제품을 함께 구매 시 프로모션 할인을 받을 수 있습니다. 적격 구매자당 적격 제품별로 하나의 프로모션 제품만 선택 가능합니다. 이 혜택은 프로모션 기간 중 재고가 있는 동안에만 유효하며, Apple은 사전 공지 없이 프로모션 기간을 변경할 수 있습니다. 추가 제한이 적용될 수 있습니다. 이 혜택에 적용되는 전체 이용 약관은
            - link "apple.com/kr/shop/back-to-school/terms-conditions" [ref=e1344] [cursor=pointer]:
              - /url: /kr/shop/back-to-school/terms-conditions
            - text: ⁠에서 확인하시기 바랍니다.
        - list [ref=e1345]:
          - listitem [ref=e1346]:
            - text: "◊ 해당 자격을 갖춘 일반 소비자 고객과 한국 거주 고객은 제품 구입 시 제휴 신용카드 회사를 통해 무이자 또는 부분 무이자 할부 결제를 이용할 수 있습니다. 무이자 할부를 이용하려면 신용카드 할부 금액 기준으로 최소 결제 금액 조건을 충족해야 합니다. 6개월~12개월 할부는 400,000원 이상, 18개월~24개월 할부는 1,200,000원 이상입니다. 무이자 할부는 현대, 하나, 국민, 신한, 삼성 카드에 한해 적용됩니다. 최소 결제 금액 조건은 신용카드 할부 금액만으로 충족되어야 합니다. 부분 결제(예: Gift Card와 신용카드를 함께 사용)의 경우, 신용카드 결제 금액이 최소 결제 금액 조건 이상이여야 합니다. 모든 할부 구입은 신용카드 발급사의 승인을 받아야 합니다. 신용카드 발급사에서 할부 구입을 승인해 주지 않는 경우에도 Apple 직원에게 승인 거부 사유가 전달되지 않습니다. 할부 조건, 수수료, 청구액 등 승인 결과는 신용카드 발급사에 문의하십시오. 결제액은 상품이 입고되거나 배송될 때 고객 계정으로 청구됩니다. 할부 서비스를 이용하려면 구입 시 현지 발급 신용카드로 결제해야 합니다. 해외 신용카드(한국 외 다른 국가 또는 지역에서 발급 받은 신용카드), 직불/체크카드 및 현지 발급/제휴 법인카드는 할부 서비스를 이용할 수 없습니다. 할부는 광고 가격 또는 정찰 가격을 기준으로 합니다. 위 할부 서비스는 이용 가능한 기간, 할부 기간 및 적용 대상 제품을 포함하되 이에 국한되지 않은 관련 내용이 사전 공지 없이 언제든지 변경 또는 중단될 수 있습니다. 위 할부 서비스는 일반 소비자 구입 건에 한하여 적용되며, 교육 할인 구입 건에는 적용되지 않습니다. 신용카드 회사에서 진행하는 소비자 대상 프로모션 및 교육 할인 스토어에서 진행되는 프로모션에 대한 자세한 내용은"
