          - listitem [ref=e1399]: "테스트는 2026년 1월과 2월 Apple에서 Apple M5 Max, 18코어 CPU, 40코어 GPU 및 128GB 통합 메모리를 탑재한 MacBook Pro 16 시제품과 Apple M4 Max, 16코어 CPU, 40코어 GPU 및 128GB 통합 메모리를 탑재한 MacBook Pro 16 판매용 제품을 사용해 진행했으며, 두 제품은 8TB SSD로 구성되었습니다. 사이버펑크 2077: 얼티밋 에디션은 레이 트레이싱을 켠 상태로 MetalFX가 균형으로 설정된 울트라 프리셋에서 1728x1080 해상도로 테스트했습니다. 성능 테스트는 특정 컴퓨터 시스템을 사용해 실시되었으며 MacBook Pro의 대략적인 성능을 반영합니다."
          - listitem [ref=e1400]:
            - text: Apple Intelligence는 베타로 사용할 수 있습니다. 일부 기능은 한국어로 제공되지 않습니다. 기능 및 언어 지원 여부 그리고 시스템 요구 사양은
            - link "support.apple.com/ko-kr/121115" [ref=e1401] [cursor=pointer]:
              - /url: https://support.apple.com/ko-kr/121115
            - text: 를 참고하십시오.
          - listitem [ref=e1402]: 테스트는 2026년 1월과 2월 Apple에서 Apple M5 Max, 18코어 CPU, 32코어 GPU, 36GB 통합 메모리 및 2TB SSD를 탑재한 MacBook Pro 16 시제품, Apple M5 Pro, 18코어 CPU, 20코어 GPU, 48GB 통합 메모리 및 1TB SSD를 탑재한 MacBook Pro 16 시제품, Apple M5 Max, 18코어 CPU, 32코어 GPU, 36GB 통합 메모리 및 2TB SSD를 탑재한 MacBook Pro 14 시제품 그리고 Apple M5 Pro, 18코어 CPU, 20코어 GPU, 24GB 통합 메모리 및 2TB SSD를 탑재한 MacBook Pro 14 시제품을 사용해 진행했습니다. MacBook Pro 16은 Apple 140W USB-C 전원 어댑터(모델 A2452)를 사용해 테스트했고, MacBook Pro 14는 Apple 96W USB-C 전원 어댑터(모델 A2166)를 사용해 테스트했으며, 두 기기 모두 USB-C-MagSafe 3 케이블(모델 A2363)을 사용했습니다. 급속 충전 테스트는 완전히 방전된 MacBook Pro 기기를 사용해 진행했습니다. 사용 시간은 잠자기 상태의 기기를 깨우기 시작한 시점 또는 기기를 켜서 화면에 Apple 로고가 표시되는 시점부터 측정했습니다. 충전 시간은 설정 및 여러 환경 요인에 따라 다릅니다. 실제 사용 결과는 다를 수도 있습니다.
          - listitem [ref=e1403]: ‘메시지’의 ‘실시간 번역’ 기능은 한국어, 중국어(간체), 중국어(번체), 네덜란드어, 영어(영국, 미국), 프랑스어(프랑스), 독일어, 이탈리아어, 일본어, 포르투갈어(브라질), 스페인어(스페인), 튀르키예어, 베트남어로 지원되며, 호환되는 iPhone, iPad 또는 Mac에서 Apple Intelligence가 활성화되었을 때 사용할 수 있고, Apple Watch Series 9 이후 모델, Apple Watch Ultra 2 이후 모델, Apple Watch SE 3에서 Apple Intelligence가 활성화된 iPhone과 페어링했을 때 사용할 수 있습니다.
          - listitem [ref=e1404]: ‘전화’ 및 FaceTime의 ‘실시간 번역’ 기능은 한국어, 중국어(북경어, 간체), 중국어(북경어, 번체), 영어(영국, 미국), 프랑스어(프랑스), 독일어, 이탈리아어, 일본어, 포르투갈어(브라질), 스페인어(스페인)로 지원되며, 호환되는 iPhone, iPad 또는 Mac에서 Apple Intelligence가 활성화되었을 때 일대일 통화에 사용할 수 있습니다.
          - listitem [ref=e1405]: Handoff는 iOS 8 이후 버전이 설치된 iPhone 또는 iPadOS가 설치된 iPad가 필요합니다.
