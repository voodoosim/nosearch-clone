<svg xmlns="http://www.w3.org/2000/svg" width="180" height="40" viewBox="0 0 180 40" fill="none">
  <!-- House icon -->
  <g>
    <!-- Roof -->
    <path d="M4 18 L20 4 L36 18" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Wall -->
    <rect x="8" y="18" width="24" height="16" rx="1" stroke="#2563eb" stroke-width="2.5" fill="none"/>
    <!-- Door -->
    <rect x="15" y="24" width="10" height="10" rx="1" fill="#2563eb"/>
    <!-- Chimney -->
    <rect x="26" y="8" width="4" height="8" rx="1" fill="#2563eb"/>
    <!-- Wifi signal on roof (smart home indicator) -->
    <path d="M17 13.5 Q20 11 23 13.5" stroke="#2563eb" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.7"/>
    <circle cx="20" cy="15.5" r="1" fill="#2563eb"/>
  </g>
  <!-- Text: 스마트홈딜 -->
  <text
    x="46"
    y="28"
    font-family="'Pretendard', 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif"
    font-size="18"
    font-weight="700"
    fill="#1e293b"
    letter-spacing="-0.5"
  >스마트홈딜</text>
</svg>
